<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChargeIQ</title>
  <link rel="stylesheet" href="style.css">
  <!-- Leaflet map library -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div id="header">
    <div id="logo">
      <span id="logo-icon">⚡</span>
      <span id="logo-text">Charge<span>IQ</span></span>
      <span id="tagline">Bengaluru EV Charging Map</span>
    </div>
    <div id="filters">
  <button class="filter-btn active" onclick="filterStations('all')">All</button>
  <button class="filter-btn" onclick="filterStations('dc')">⚡ DC Fast</button>
  <button class="filter-btn" onclick="filterStations('ac')">🔌 AC</button>
</div>
    <div id="station-count">Loading...</div>
  </div>
  <div id="map"></div>
  <script src="app.js"></script>
</body>
</html>
